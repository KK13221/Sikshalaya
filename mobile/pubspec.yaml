name: studentlens_teacher_app
description: Teacher mobile app shell for StudentLens using Flutter, Riverpod, and GoRouter.
publish_to: none
version: 0.1.0+1
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^7.0.0
  dio: ^5.3.0
  cached_network_image: ^3.2.3
  intl: ^0.18.1
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0
  workmanager: ^0.6.0
  drift: ^2.8.0
  sqlcipher_flutter_libs: ^0.6.0
  cupertino_icons: ^1.0.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.jpg"

flutter:
  uses-material-design: true
